spring:
  application:
    name: system-monitor-api
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=30s
  security:
    user:
      name: admin
      password: admin123

server:
  port: 8080
  servlet:
    context-path: /api/monitoring
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    org.systeminfo.systeminfoapi: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10

api:
  security:
    enabled: true
    apiKey: system-monitor-api-key-2024
    publicEndpoints:
      - /api/monitoring/health
      - /api/monitoring/info
      - /api/monitoring/metrics
      - /api/monitoring/prometheus

kind: Application